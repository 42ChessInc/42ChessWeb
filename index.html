    <!-- Primary Meta Tags -->
    <title>42 Chess Club</title>

      name="description"
      content="Official chess club for 42 Porto — a community where students and alumni play, learn, and compete. Join meetings, workshops, and tournaments focused on chess improvement and friendly competition."

      name="keywords"
      content="42 Chess Club, 42 Porto, chess club, chess, tournaments, meetups, workshops, chess community"
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://42chessinc.github.io/42Chess-Web/"
    />

      property="og:description"
      content="Official chess club for 42 Porto — play, learn and compete. Find meetups, lessons, and tournaments for students and alumni."

      property="twitter:description"

        "address": {

          "addressLocality": "Porto",

        },

          "Tournaments",

          "Coaching",

        ]
